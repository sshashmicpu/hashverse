<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CalPro Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Orbitron', monospace;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 168, 255, 0.05) 0%, transparent 70%),
                radial-gradient(circle at 80% 20%, rgba(0, 255, 168, 0.05) 0%, transparent 70%);
            animation: pulse 6s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.2; }
            100% { opacity: 0.4; }
        }

        html {
            height: 100%;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .calculator {
            background: #000000;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 
                0 0 60px rgba(0, 168, 255, 0.3),
                inset 0 0 20px rgba(0, 168, 255, 0.05);
            border: 2px solid rgba(0, 168, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Landscape specific adjustments for height */
        @media (orientation: landscape) {
            .container {
                max-width: 95vw;
                padding: 5px;
            }
            .calculator {
                padding: 10px 20px !important;
                border-radius: 15px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                height: 92vh; /* Keeps calculator within screen */
            }
            .landscape-header-group {
                display: grid;
                grid-template-columns: 1fr 2fr;
                gap: 15px;
                align-items: center;
                margin-bottom: 8px;
            }
            .display {
                margin-bottom: 0 !important;
                padding: 5px 15px !important;
                min-height: 50px !important;
            }
            .display-main {
                font-size: 28px !important;
            }
            .display-secondary {
                font-size: 14px !important;
                margin-bottom: 2px !important;
            }
            .header {
                margin-bottom: 0 !important;
                text-align: left !important;
            }
            .logo { font-size: 16px !important; letter-spacing: 2px !important; margin-bottom: 2px !important; }
            .tagline, .signature { font-size: 9px !important; }
            
            .buttons {
                grid-template-columns: repeat(8, 1fr);
                gap: 6px !important; /* Tighten gap */
                flex: 1;
            }
            button {
                padding: 8px 2px !important; /* Smaller padding */
                font-size: 12px !important;
                border-radius: 8px !important;
            }
        }

        .calculator::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 168, 255, 0.15), transparent);
            animation: scan 4s linear infinite;
        }

        .calculator::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(0, 255, 168, 0.2);
            border-radius: 20px;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(-100%) translateX(-100%); }
            100% { transform: translateY(100%) translateX(100%); }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 31px;
            font-weight: 870;
            color: #00a8ff;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0 0 25px rgba(0, 168, 255, 1);
            margin-bottom: 8px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(0, 168, 255, 0.8); }
            to { text-shadow: 0 0 30px rgba(0, 168, 255, 1); }
        }

        .tagline { font-size: 14px; color: #6b7c93; letter-spacing: 3px; }
        .signature { font-size: 12px; color: #00ff88; letter-spacing: 2px; }

        .display {
            background: #000000;
            border: 2px solid rgba(0, 168, 255, 0.4);
            border-radius: 20px;
            padding: 30px 25px;
            margin-bottom: 30px;
            min-height: 100px;
            position: relative;
            z-index: 1;
        }

        .display-secondary {
            font-size: 18px;
            color: #6b7c93;
            text-align: right;
            margin-bottom: 15px;
            min-height: 25px;
        }

        .display-main {
            font-size: 52px;
            color: #00a8ff;
            text-align: right;
            font-weight: 900;
            text-shadow: 0 0 25px rgba(0, 168, 255, 1);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        button {
            background: #000000;
            border: 2px solid rgba(0, 168, 255, 0.3);
            border-radius: 15px;
            color: #00a8ff;
            font-size: 22px;
            padding: 22px 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 900;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: rgba(0, 168, 255, 0.25);
            border-color: rgba(0, 168, 255, 0.8);
            transform: translateY(-3px);
            color: #fff;
        }

        .operator { background: rgba(0, 168, 255, 0.2); color: #00d4ff; }
        .function { background: rgba(0, 255, 136, 0.15); color: #00ff88; font-size: 16px; }
        .equals { background: linear-gradient(135deg, rgba(0, 168, 255, 0.4), rgba(0, 212, 255, 0.4)); color: #fff; grid-column: span 2; }
        .clear { background: rgba(255, 50, 50, 0.25); color: #ff6b6b; }
        .zero { grid-column: span 2; }

        .landscape-only { display: none; }
        @media (orientation: landscape) { .landscape-only { display: block; } }

        @media (max-width: 480px) and (orientation: portrait) {
            .container { padding: 10px; max-width: 380px; }
            .calculator { padding: 25px; }
            .display-main { font-size: 40px; }
            button { padding: 18px 12px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="landscape-header-group">
                <div class="header">
                    <div class="logo">CALCULATOR</div>
                    <div class="tagline">DESIGNED BY</div>
                    <div class="signature">HASH TECH</div>
                </div>
                
                <div class="display">
                    <div class="display-secondary" id="secondary-display"></div>
                    <div class="display-main" id="main-display">0</div>
                </div>
            </div>

            <div class="buttons">
                <button class="function landscape-only" onclick="scientificFunction('pow3')">x³</button>
                <button class="function landscape-only" onclick="scientificFunction('abs')">|x|</button>
                <button class="function landscape-only" onclick="scientificFunction('pi')">π</button>
                
                <button class="function" onclick="scientificFunction('sin')">SIN</button>
                <button class="function" onclick="scientificFunction('cos')">COS</button>
                <button class="function" onclick="scientificFunction('tan')">TAN</button>
                <button class="function" onclick="scientificFunction('log')">LOG</button>
                <button class="clear" onclick="clearDisplay()">AC</button>

                <button class="function landscape-only" onclick="scientificFunction('exp')">exp</button>
                <button class="function landscape-only" onclick="scientificFunction('ln')">ln</button>
                <button class="function landscape-only" onclick="scientificFunction('e')">e</button>
                
                <button class="function" onclick="scientificFunction('sqrt')">√</button>
                <button class="function" onclick="scientificFunction('pow')">x²</button>
                <button class="function" onclick="appendOperator('%')">%</button>
                <button class="operator" onclick="appendOperator('±')">±</button>
                <button class="clear" onclick="backspace()">DEL</button>

                <button class="function landscape-only" onclick="scientificFunction('fact')">n!</button>
                <button class="function landscape-only" onclick="scientificFunction('asin')">sin⁻¹</button>
                <button class="function landscape-only" onclick="scientificFunction('acos')">cos⁻¹</button>
                
                <button class="operator" onclick="appendOperator('(')">(</button>
                <button class="operator" onclick="appendOperator(')')">)</button>
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>

                <button class="function landscape-only" onclick="scientificFunction('atan')">tan⁻¹</button>
                <button class="function landscape-only" onclick="scientificFunction('rad')">Rad</button>
                <button class="function landscape-only" onclick="scientificFunction('deg')">Deg</button>
                
                <button class="operator" onclick="appendOperator('÷')">÷</button>
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('×')">×</button>

                <button class="function landscape-only" style="visibility:hidden"></button>
                <button class="function landscape-only" style="visibility:hidden"></button>
                <button class="function landscape-only" style="visibility:hidden"></button>
                
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="operator" onclick="appendOperator('-')">−</button>
                <button class="operator" onclick="appendOperator('+')">+</button>

                <button class="function landscape-only" style="visibility:hidden"></button>
                <button class="function landscape-only" style="visibility:hidden"></button>
                <button class="function landscape-only" style="visibility:hidden"></button>
                
                <button class="zero" onclick="appendNumber('0')">0</button>
                <button onclick="appendNumber('.')">.</button>
                <button class="equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <script>
        let currentValue = '0';
        let previousValue = '';
        let operation = '';
        let shouldResetDisplay = false;
        let parenthesesCount = 0;

        const mainDisplay = document.getElementById('main-display');
        const secondaryDisplay = document.getElementById('secondary-display');

        function updateDisplay() {
            mainDisplay.textContent = currentValue;
            secondaryDisplay.textContent = (previousValue && operation) ? `${previousValue} ${operation}` : '';
        }

        function appendNumber(num) {
            triggerHaptic();
            if (shouldResetDisplay) { currentValue = num; shouldResetDisplay = false; }
            else { if (num === '.' && currentValue.includes('.')) return; currentValue = (currentValue === '0' && num !== '.') ? num : currentValue + num; }
            updateDisplay();
        }

        function appendOperator(op) {
            triggerHaptic();
            if (op === '±') { currentValue = String(parseFloat(currentValue) * -1); updateDisplay(); return; }
            if (op === '%') { currentValue = String(parseFloat(currentValue) / 100); updateDisplay(); return; }
            if (op === '(' || op === ')') {
                if (op === '(') parenthesesCount++;
                if (op === ')' && parenthesesCount > 0) parenthesesCount--;
                currentValue = (currentValue === '0' && op === '(') ? op : currentValue + op;
                updateDisplay(); return;
            }
            if (previousValue && operation && !shouldResetDisplay) calculate();
            previousValue = currentValue; operation = op; shouldResetDisplay = true; updateDisplay();
        }

        function scientificFunction(func) {
            triggerHaptic();
            const current = parseFloat(currentValue);
            let result;
            switch (func) {
                case 'sin': result = Math.sin(current * Math.PI / 180); break;
                case 'cos': result = Math.cos(current * Math.PI / 180); break;
                case 'tan': result = Math.tan(current * Math.PI / 180); break;
                case 'asin': result = Math.asin(current) * 180 / Math.PI; break;
                case 'acos': result = Math.acos(current) * 180 / Math.PI; break;
                case 'atan': result = Math.atan(current) * 180 / Math.PI; break;
                case 'log': result = Math.log10(current); break;
                case 'ln': result = Math.log(current); break;
                case 'sqrt': result = Math.sqrt(current); break;
                case 'pow': result = Math.pow(current, 2); break;
                case 'pow3': result = Math.pow(current, 3); break;
                case 'abs': result = Math.abs(current); break;
                case 'pi': result = Math.PI; break;
                case 'e': result = Math.E; break;
                case 'exp': result = Math.exp(current); break;
                case 'fact':
                    let f = 1; for (let i = 1; i <= current; i++) f *= i; result = f; break;
                default: return;
            }
            currentValue = isNaN(result) || !isFinite(result) ? 'Error' : String(Math.round(result * 1000000) / 1000000);
            shouldResetDisplay = true; updateDisplay();
        }

        function calculate() {
            triggerHaptic('heavy');
            if (!previousValue || !operation) return;
            try {
                let expression = previousValue + operation + currentValue;
                expression = expression.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                const result = Function('"use strict"; return (' + expression + ')')();
                currentValue = isFinite(result) ? String(Math.round(result * 1000000) / 1000000) : 'Error';
            } catch (e) { currentValue = 'Error'; }
            previousValue = ''; operation = ''; shouldResetDisplay = true; updateDisplay();
        }

        function clearDisplay() { triggerHaptic('heavy'); currentValue = '0'; previousValue = ''; operation = ''; updateDisplay(); }
        function backspace() { triggerHaptic(); currentValue = currentValue.length > 1 ? currentValue.slice(0, -1) : '0'; updateDisplay(); }

        function triggerHaptic(intensity = 'light') {
            if ('vibrate' in navigator) {
                if (intensity === 'light') navigator.vibrate(10);
                else navigator.vibrate([30, 20, 30]);
            }
        }
        updateDisplay();
    </script>
</body>
</html>
